<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Entertainment Chat</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      color: #eee;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      background:
        linear-gradient(180deg, rgba(10, 0, 20, 0.9) 0%, rgba(40, 0, 60, 0.85) 100%),
        linear-gradient(90deg, rgba(0, 255, 255, 0.07) 1px, transparent 1px),
        linear-gradient(rgba(255, 0, 255, 0.07) 1px, transparent 1px);
      background-size: 100% 100%, 40px 40px, 40px 40px;
      background-position: 0 0, 0 0, 0 0;
      position: relative;
      overflow-x: hidden;
      animation: gridMove 20s linear infinite;
    }

    @keyframes gridMove {
      0% { background-position: 0 0, 0 0, 0 0; }
      100% { background-position: 0 0, 0 40px, 0 40px; }
    }

    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background:
        radial-gradient(circle at 20% 30%, rgba(255, 0, 255, 0.2) 0%, transparent 40%),
        radial-gradient(circle at 80% 70%, rgba(0, 255, 255, 0.2) 0%, transparent 40%),
        radial-gradient(circle at 50% 50%, rgba(255, 255, 0, 0.1) 0%, transparent 50%);
      pointer-events: none;
      z-index: -1;
    }

    body::after {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image:
        radial-gradient(circle, rgba(255, 255, 255, 0.8) 1px, transparent 1px),
        radial-gradient(circle, rgba(0, 255, 255, 0.6) 1px, transparent 1px),
        radial-gradient(circle, rgba(255, 0, 255, 0.6) 1px, transparent 1px);
      background-size: 120px 120px, 200px 200px, 350px 350px;
      background-position: 0 0, 50px 80px, 100px 150px;
      opacity: 0.4;
      pointer-events: none;
      z-index: -1;
      animation: stars 40s linear infinite;
    }

    @keyframes stars {
      0% { transform: translateY(0); }
      100% { transform: translateY(-20px); }
    }

    header {
      padding: 20px;
      text-align: center;
      width: 100%;
    }

    header h1 {
      font-family: 'Press Start 2P', cursive;
      font-size: 1.2rem;
      color: #00ffff;
      text-shadow:
        0 0 5px #00ffff,
        0 0 10px #00ffff,
        0 0 20px #00ffff,
        0 0 40px #ff00ff;
      letter-spacing: 2px;
    }

    header p {
      color: #ff9ff3;
      font-size: 0.85rem;
      margin-top: 10px;
      text-shadow: 0 0 5px rgba(255, 0, 255, 0.5);
    }

    .chat-container {
      width: 100%;
      max-width: 700px;
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 0 20px 20px;
    }

    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      background: rgba(0, 0, 0, 0.7);
      border: 2px solid #ff00ff;
      border-radius: 16px;
      box-shadow:
        0 0 10px rgba(255, 0, 255, 0.4),
        inset 0 0 30px rgba(255, 0, 255, 0.1);
      margin-bottom: 15px;
      min-height: 300px;
      max-height: 60vh;
    }

    .messages::-webkit-scrollbar {
      width: 10px;
    }

    .messages::-webkit-scrollbar-track {
      background: rgba(0, 0, 0, 0.5);
      border-radius: 5px;
    }

    .messages::-webkit-scrollbar-thumb {
      background: linear-gradient(180deg, #00ffff, #ff00ff);
      border-radius: 5px;
    }

    .message {
      margin-bottom: 15px;
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .message.user {
      text-align: right;
    }

    .message .bubble {
      display: inline-block;
      padding: 12px 18px;
      border-radius: 18px;
      max-width: 80%;
      text-align: left;
      line-height: 1.5;
      white-space: pre-wrap;
      word-wrap: break-word;
      font-weight: 500;
    }

    .message.user .bubble {
      background: linear-gradient(135deg, #00ffff, #0088ff);
      color: #000;
      border-bottom-right-radius: 4px;
      box-shadow: 0 0 15px rgba(0, 255, 255, 0.4);
      text-shadow: 0 0 2px rgba(255, 255, 255, 0.5);
    }

    .message.bot .bubble {
      background: rgba(255, 0, 255, 0.15);
      color: #fff;
      border: 1px solid rgba(255, 0, 255, 0.5);
      border-bottom-left-radius: 4px;
      box-shadow: 0 0 15px rgba(255, 0, 255, 0.2);
    }

    .message.bot .bubble.error {
      background: rgba(255, 0, 80, 0.2);
      border: 1px solid #ff0055;
      box-shadow: 0 0 15px rgba(255, 0, 80, 0.4);
      color: #ff99aa;
    }

    .input-area {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .input-area input {
      flex: 1;
      padding: 14px 18px;
      border: 2px solid rgba(0, 255, 255, 0.5);
      border-radius: 25px;
      background: rgba(0, 0, 0, 0.6);
      color: #fff;
      font-size: 1rem;
      outline: none;
      transition: all 0.2s;
      box-shadow: 0 0 10px rgba(0, 255, 255, 0.2);
    }

    .input-area input:focus {
      border-color: #00ffff;
      box-shadow: 0 0 20px rgba(0, 255, 255, 0.4);
      background: rgba(0, 0, 0, 0.8);
    }

    .input-area input::placeholder {
      color: #00cccc;
    }

    .input-area button {
      padding: 14px 24px;
      border: 2px solid #ff00ff;
      border-radius: 25px;
      background: rgba(255, 0, 255, 0.2);
      color: #fff;
      font-size: 1rem;
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
      box-shadow: 0 0 15px rgba(255, 0, 255, 0.3);
      text-shadow: 0 0 5px rgba(255, 255, 255, 0.5);
    }

    .input-area button:hover {
      transform: scale(1.05);
      background: rgba(255, 0, 255, 0.4);
      box-shadow: 0 0 25px rgba(255, 0, 255, 0.5);
    }

    .input-area button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    .typing {
      display: inline-flex;
      gap: 4px;
      padding: 12px 18px;
    }

    .typing span {
      width: 8px;
      height: 8px;
      background: #00ffff;
      border-radius: 50%;
      box-shadow: 0 0 10px #00ffff;
      animation: bounce 1.4s infinite;
    }

    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-8px); }
    }

    .topics {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 15px;
      justify-content: center;
    }

    .topics button {
      padding: 6px 14px;
      border: 1px solid #00ffff;
      border-radius: 20px;
      background: rgba(0, 255, 255, 0.1);
      color: #00ffff;
      font-size: 0.8rem;
      cursor: pointer;
      transition: all 0.2s;
      box-shadow: 0 0 8px rgba(0, 255, 255, 0.2);
    }

    .topics button:hover {
      background: rgba(0, 255, 255, 0.25);
      box-shadow: 0 0 15px rgba(0, 255, 255, 0.5);
      color: #fff;
      transform: translateY(-2px);
    }
  </style>
</head>
<body>
  <header>
    <h1>🎬 AI Entertainment Chat</h1>
    <p>Pregúntame sobre cine, series, música, videojuegos y más</p>
  </header>

  <div class="chat-container">
    <div class="topics">
      <button onclick="sendTopic('Recomiéndame una película de ciencia ficción')">🎬 Cine</button>
      <button onclick="sendTopic('¿Qué series están de moda ahora?')">📺 Series</button>
      <button onclick="sendTopic('Háblame sobre los Grammy 2025')">🎵 Música</button>
      <button onclick="sendTopic('¿Qué videojuegos jugar en 2025?')">🎮 Videojuegos</button>
      <button onclick="sendTopic('Recomiéndame un libro de fantasía')">📚 Libros</button>
    </div>

    <div class="messages" id="messages">
      <div class="message bot">
        <div class="bubble">¡Hola! Soy tu asistente de entretenimiento. Puedo ayudarte con cine, series, música, videojuegos, libros, deportes y más. ¿Qué te gustaría saber?</div>
      </div>
    </div>

    <div class="input-area">
      <input type="text" id="input" placeholder="Escribe tu pregunta sobre entretenimiento..." autocomplete="off" />
      <button id="sendBtn" onclick="sendMessage()">Enviar</button>
    </div>
  </div>

  <script>
    const API_URL = '/api/chat';
    const messagesEl = document.getElementById('messages');
    const inputEl = document.getElementById('input');
    const sendBtn = document.getElementById('sendBtn');

    inputEl.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') sendMessage();
    });

    function addMessage(text, isUser, isError = false) {
      const div = document.createElement('div');
      div.className = `message ${isUser ? 'user' : 'bot'}`;
      const bubble = document.createElement('div');
      bubble.className = `bubble${isError ? ' error' : ''}`;
      bubble.textContent = text;
      div.appendChild(bubble);
      messagesEl.appendChild(div);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function addTyping() {
      const div = document.createElement('div');
      div.className = 'message bot';
      div.id = 'typing-indicator';
      div.innerHTML = '<div class="typing"><span></span><span></span><span></span></div>';
      messagesEl.appendChild(div);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function removeTyping() {
      const el = document.getElementById('typing-indicator');
      if (el) el.remove();
    }

    function sendTopic(text) {
      inputEl.value = text;
      sendMessage();
    }

    async function sendMessage() {
      const message = inputEl.value.trim();
      if (!message) return;

      addMessage(message, true);
      inputEl.value = '';
      sendBtn.disabled = true;
      addTyping();

      try {
        const res = await fetch(API_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message })
        });

        const data = await res.json();

        removeTyping();

        if (!res.ok) {
          addMessage(data.error || 'Error al conectar con el servidor', false, true);
        } else {
          addMessage(data.reply, false);
        }
      } catch (err) {
        removeTyping();
        addMessage('No se pudo conectar con el backend. ¿Está corriendo en localhost:3001?', false, true);
      }

      sendBtn.disabled = false;
      inputEl.focus();
    }
  </script>
</body>
</html>
